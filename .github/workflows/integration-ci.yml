name: integration-ci

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - ".env.example"
      - ".github/workflows/integration-ci.yml"
  push:
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - ".env.example"
      - ".github/workflows/integration-ci.yml"
  workflow_dispatch:

concurrency:
  group: integration-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker-compose-smoke:
    name: docker-compose-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create CI environment file
        run: |
          cat <<EOF > .env
          POSTGRES_DB=products
          POSTGRES_USER=products
          POSTGRES_PASSWORD=products
          POSTGRES_CONTAINER_PORT=5432
          BACKEND_PORT=9091
          SERVER_PORT=9091
          SPRING_APPLICATION_NAME=EMT Advanced
          SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/products?useUnicode=true&characterEncoding=UTF-8&serverTimezone=CET
          SPRING_DATASOURCE_USERNAME=products
          SPRING_DATASOURCE_PASSWORD=products
          SPRING_JPA_HIBERNATE_DDL_AUTO=none
          SPRING_JPA_HIBERNATE_SHOW_SQL=false
          SPRING_JPA_SHOW_SQL=false
          SPRING_JPA_FORMAT_SQL=false
          APP_CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
          APP_CORS_ALLOWED_METHODS=GET,POST,PUT,PATCH,DELETE,OPTIONS
          APP_CORS_ALLOWED_HEADERS=*
          SIMILAR_PRODUCTS_PRICE_WINDOW=3000
          GEMINI_API_KEY=
          GEMINI_MODEL=gemini-2.0-flash-001
          FRONTEND_PORT=3000
          FRONTEND_CONTAINER_PORT=8080
          VITE_API_BASE_URL=/api
          VITE_API_PROXY_TARGET=http://localhost:9091
          BACKEND_INTERNAL_URL=http://backend:9091
          BACKEND_IMAGE_REPOSITORY=emt-backend
          FRONTEND_IMAGE_REPOSITORY=emt-frontend
          IMAGE_TAG=ci
          COMPOSE_NETWORK_NAME=emt-private
          POSTGRES_DATA_VOLUME_NAME=emt-postgres-data-ci
          EOF

      - name: Validate Compose configuration
        run: docker compose config

      - name: Build Docker images
        run: docker compose build

      - name: Start full stack
        run: docker compose up -d --wait

      - name: Smoke test backend API
        run: |
          curl --fail --silent --show-error --retry 12 --retry-delay 5 --retry-connrefused \
            http://localhost:9091/api/products/frizideri > /tmp/backend-products.json
          test -s /tmp/backend-products.json

      - name: Smoke test frontend routes
        run: |
          curl --fail --silent --show-error --retry 12 --retry-delay 5 --retry-connrefused \
            http://localhost:3000/products > /tmp/frontend-products.html
          grep -qi "<!doctype html" /tmp/frontend-products.html
          location="$(curl -I --silent http://localhost:3000/ | awk -F': ' 'tolower($1) == "location" {print $2}' | tr -d '\r')"
          test "$location" = "/products"

      - name: Print container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop stack
        if: always()
        run: docker compose down -v --remove-orphans
