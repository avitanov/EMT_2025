name: frontend-ci

on:
  pull_request:
    paths:
      - "frontend/**"
      - "docker-compose.yml"
      - ".github/workflows/frontend-ci.yml"
  push:
    paths:
      - "frontend/**"
      - "docker-compose.yml"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME || '' }}
  ECR_FRONTEND_REPOSITORY: ${{ vars.ECR_FRONTEND_REPOSITORY || 'emt-frontend' }}
  FRONTEND_CONTAINER_PORT: ${{ vars.FRONTEND_CONTAINER_PORT || '8080' }}
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || '/api' }}
  FRONTEND_PORT: ${{ vars.FRONTEND_PORT || '3000' }}
  VITE_API_PROXY_TARGET: ${{ vars.VITE_API_PROXY_TARGET || 'http://localhost:9091' }}
  GITOPS_REPOSITORY: ${{ vars.GITOPS_REPOSITORY || '' }}
  GITOPS_BRANCH: ${{ vars.GITOPS_BRANCH || 'main' }}
  GITOPS_FRONTEND_VALUES_FILE: ${{ vars.GITOPS_FRONTEND_VALUES_FILE || '' }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test-frontend:
    name: test-frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  build-frontend-image:
    name: build-frontend-image
    runs-on: ubuntu-latest
    needs: test-frontend

    outputs:
      image_repository: ${{ steps.image.outputs.image_repository }}
      image_tag: ${{ steps.image.outputs.image_tag }}
      image_ref: ${{ steps.image.outputs.image_ref }}

    env:
      SHOULD_PUBLISH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate publishing configuration
        if: env.SHOULD_PUBLISH == 'true'
        run: |
          test -n "${AWS_ROLE_TO_ASSUME}" || { echo "Missing repository variable AWS_ROLE_TO_ASSUME"; exit 1; }
          test -n "${AWS_REGION}" || { echo "Missing repository variable AWS_REGION"; exit 1; }
          test -n "${ECR_FRONTEND_REPOSITORY}" || { echo "Missing repository variable ECR_FRONTEND_REPOSITORY"; exit 1; }

      - name: Configure AWS credentials
        if: env.SHOULD_PUBLISH == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check if frontend image already exists in ECR
        if: env.SHOULD_PUBLISH == 'true'
        id: ecr-check
        run: |
          if aws ecr describe-images \
            --repository-name "${ECR_FRONTEND_REPOSITORY}" \
            --image-ids imageTag="${IMAGE_TAG}" \
            >/dev/null 2>&1; then
            echo "image_exists=true" >> "$GITHUB_OUTPUT"
            echo "Frontend image already exists in ECR: ${ECR_FRONTEND_REPOSITORY}:${IMAGE_TAG}"
          else
            echo "image_exists=false" >> "$GITHUB_OUTPUT"
            echo "Frontend image does not exist yet. It will be built and pushed."
          fi

      - name: Login to Amazon ECR
        if: env.SHOULD_PUBLISH == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Prepare image reference
        id: image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          if [ "${SHOULD_PUBLISH}" = "true" ]; then
            echo "image_repository=${ECR_REGISTRY}/${ECR_FRONTEND_REPOSITORY}" >> "$GITHUB_OUTPUT"
            echo "image_ref=${ECR_REGISTRY}/${ECR_FRONTEND_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "image_repository=${ECR_FRONTEND_REPOSITORY}" >> "$GITHUB_OUTPUT"
            echo "image_ref=${ECR_FRONTEND_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          fi

          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build frontend Docker image
        if: env.SHOULD_PUBLISH != 'true' || steps.ecr-check.outputs.image_exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ env.SHOULD_PUBLISH == 'true' }}
          tags: ${{ steps.image.outputs.image_ref }}
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
            FRONTEND_CONTAINER_PORT=${{ env.FRONTEND_CONTAINER_PORT }}
          cache-from: type=gha,scope=frontend-image
          cache-to: type=gha,mode=max,scope=frontend-image
          provenance: false
          sbom: false

      - name: Skip frontend image push
        if: env.SHOULD_PUBLISH == 'true' && steps.ecr-check.outputs.image_exists == 'true'
        run: |
          echo "Skipping Docker build and push because image already exists:"
          echo "${{ steps.image.outputs.image_ref }}"

  update-gitops-frontend-tag:
    name: update-gitops-frontend-tag
    runs-on: ubuntu-latest
    needs: build-frontend-image

    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.GITOPS_REPOSITORY != '' &&
      vars.GITOPS_FRONTEND_VALUES_FILE != ''

    steps:
      - name: Validate GitOps configuration
        env:
          GITOPS_REPO_TOKEN: ${{ secrets.GITOPS_REPO_TOKEN }}
        run: |
          test -n "${GITOPS_REPO_TOKEN}" || { echo "Missing secret GITOPS_REPO_TOKEN"; exit 1; }

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPOSITORY }}
          ref: ${{ env.GITOPS_BRANCH }}
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops

      - name: Update frontend image reference
        uses: mikefarah/yq@v4.45.1
        with:
          cmd: >
            yq -i '
            .frontend.image.repository = "${{ needs.build-frontend-image.outputs.image_repository }}" |
            .frontend.image.tag = "${{ needs.build-frontend-image.outputs.image_tag }}"
            ' "gitops/${{ env.GITOPS_FRONTEND_VALUES_FILE }}"

      - name: Commit and push GitOps change
        working-directory: gitops
        env:
          FRONTEND_VALUES_FILE: ${{ env.GITOPS_FRONTEND_VALUES_FILE }}
          GITOPS_BRANCH: ${{ env.GITOPS_BRANCH }}
          IMAGE_TAG: ${{ needs.build-frontend-image.outputs.image_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${FRONTEND_VALUES_FILE}"

          if git diff --cached --quiet; then
            echo "No GitOps changes to commit."
            exit 0
          fi

          git commit -m "build: update frontend image tag to ${IMAGE_TAG}"
          git push origin "${GITOPS_BRANCH}"
