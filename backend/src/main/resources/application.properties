spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

spring.application.name=${SPRING_APPLICATION_NAME}
server.port=${SERVER_PORT}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.show-sql=${SPRING_JPA_HIBERNATE_SHOW_SQL}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL}
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL}
spring.cloud.compatibility-verifier.enabled=false

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
app.cors.allowed-methods=${APP_CORS_ALLOWED_METHODS}
app.cors.allowed-headers=${APP_CORS_ALLOWED_HEADERS}
app.similarity.price-window=${SIMILAR_PRODUCTS_PRICE_WINDOW}
gemini.api.key=${GEMINI_API_KEY}
gemini.model=${GEMINI_MODEL}
