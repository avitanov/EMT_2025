services:
  postgres:
    image: postgres:15.13-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGPORT: ${POSTGRES_CONTAINER_PORT}
    command: ["postgres", "-c", "port=${POSTGRES_CONTAINER_PORT}"]
    expose:
      - "${POSTGRES_CONTAINER_PORT}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/db:/docker-entrypoint-initdb.d:ro
      - ./backend/data/inverteri.csv:/import/inverteri.csv:ro
      - ./backend/data/frizideri.csv:/import/frizideri.csv:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -p ${POSTGRES_CONTAINER_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - emt-private

  backend:
    image: ${BACKEND_IMAGE_REPOSITORY}:${IMAGE_TAG}
    build:
      context: ./backend
      args:
        SERVER_PORT: ${SERVER_PORT}
    env_file:
      - .env
    environment:
      SERVER_PORT: ${SERVER_PORT}
      SPRING_APPLICATION_NAME: ${SPRING_APPLICATION_NAME}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
      SPRING_JPA_HIBERNATE_SHOW_SQL: ${SPRING_JPA_HIBERNATE_SHOW_SQL}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL}
      SPRING_JPA_FORMAT_SQL: ${SPRING_JPA_FORMAT_SQL}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      APP_CORS_ALLOWED_METHODS: ${APP_CORS_ALLOWED_METHODS}
      APP_CORS_ALLOWED_HEADERS: ${APP_CORS_ALLOWED_HEADERS}
      SIMILAR_PRODUCTS_PRICE_WINDOW: ${SIMILAR_PRODUCTS_PRICE_WINDOW}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL}
    ports:
      - "${BACKEND_PORT}:${SERVER_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:$${SERVER_PORT}/api/products/frizideri || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - emt-private

  frontend:
    image: ${FRONTEND_IMAGE_REPOSITORY}:${IMAGE_TAG}
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        FRONTEND_CONTAINER_PORT: ${FRONTEND_CONTAINER_PORT}
    env_file:
      - .env
    environment:
      FRONTEND_CONTAINER_PORT: ${FRONTEND_CONTAINER_PORT}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_CONTAINER_PORT}"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:${FRONTEND_CONTAINER_PORT}/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - emt-private

volumes:
  postgres-data:
    name: ${POSTGRES_DATA_VOLUME_NAME}

networks:
  emt-private:
    name: ${COMPOSE_NETWORK_NAME}
    driver: bridge
